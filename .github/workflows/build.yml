name: Build IPA (Swift + iPhoneOS16.5 SDK)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  APP_NAME: TrollApp
  BUNDLE_ID: com.yourname.trollapp
  SDK_DIR: iPhoneOS16.5.sdk          # folder must sit at repo root
  DEPLOYMENT_TARGET: "14.0"

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download SDK archive
        env:
          SDK_URL: ${{ secrets.SDK_URL }}
        run: |
          set -euo pipefail
          if [ -d "$SDK_DIR" ]; then
            echo "SDK folder already present in repo, skipping download."
            exit 0
          fi
          if [ -f "iPhoneOS16.5.sdk.tar.xz" ]; then
            echo "Found local archive in repo, will extract that."
            exit 0
          fi
          if [ -z "${SDK_URL:-}" ]; then
            echo "::error::No $SDK_DIR folder or iPhoneOS16.5.sdk.tar.xz in repo, and no SDK_URL secret set."
            exit 1
          fi
          echo "Downloading SDK archive from SDK_URL secret..."
          curl -L --fail -o iPhoneOS16.5.sdk.tar.xz "$SDK_URL"

      - name: Extract SDK archive
        run: |
          set -euo pipefail
          if [ -d "$SDK_DIR" ]; then
            echo "Using SDK at: $(pwd)/$SDK_DIR"
            exit 0
          fi
          if [ ! -f "iPhoneOS16.5.sdk.tar.xz" ]; then
            echo "::error::iPhoneOS16.5.sdk.tar.xz not found after download step."
            exit 1
          fi
          echo "Extracting iPhoneOS16.5.sdk.tar.xz ..."
          tar -xJf iPhoneOS16.5.sdk.tar.xz

          # Archive may already contain the SDK_DIR folder at its root,
          # or extract flat/nested — normalize either case.
          if [ ! -d "$SDK_DIR" ]; then
            FOUND_DIR=$(find . -maxdepth 3 -type d -name "iPhoneOS16.5.sdk" | head -n 1)
            if [ -n "$FOUND_DIR" ] && [ "$FOUND_DIR" != "./$SDK_DIR" ]; then
              mv "$FOUND_DIR" "$SDK_DIR"
            fi
          fi

          if [ ! -d "$SDK_DIR" ]; then
            echo "::error::Extraction succeeded but '$SDK_DIR' folder not found. Check archive layout."
            exit 1
          fi
          echo "Using SDK at: $(pwd)/$SDK_DIR"

      - name: Install ldid
        run: brew install ldid || brew install --HEAD ldid

      - name: Compile Swift sources
        run: |
          set -euo pipefail
          mkdir -p build
          xcrun swiftc \
            Sources/*.swift \
            -sdk "$SDK_DIR" \
            -target arm64-apple-ios${DEPLOYMENT_TARGET} \
            -swift-version 5 \
            -emit-executable \
            -o "build/${APP_NAME}"

      - name: Assemble .app bundle
        run: |
          set -euo pipefail
          APP_DIR="build/${APP_NAME}.app"
          mkdir -p "$APP_DIR"
          cp "build/${APP_NAME}" "$APP_DIR/${APP_NAME}"
          cp Info.plist "$APP_DIR/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleExecutable ${APP_NAME}" "$APP_DIR/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier ${BUNDLE_ID}" "$APP_DIR/Info.plist"

      - name: Sign with entitlements (ldid)
        run: |
          set -euo pipefail
          ldid -Sentitlements.plist "build/${APP_NAME}.app/${APP_NAME}"

      - name: Package IPA
        run: |
          set -euo pipefail
          cd build
          mkdir -p Payload
          cp -R "${APP_NAME}.app" Payload/
          zip -r "${APP_NAME}.ipa" Payload
          mkdir -p ../out
          mv "${APP_NAME}.ipa" ../out/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-ipa
          path: out/*.ipa
          if-no-files-found: error
